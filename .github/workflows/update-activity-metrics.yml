name: Update Activity Metrics

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
  workflow_call:

permissions:
  contents: write

concurrency:
  group: index-activity-metrics
  cancel-in-progress: false

env:
  NODE_VERSION: '22'
  DOCKER_HUB_REPOSITORY: 'newbe36524/hagicode'
  # Canonical metrics data and the derived catalog summary ship as one publication set.
  ACTIVITY_METRICS_PUBLICATION_SET: >-
    public/activity-metrics.json
    public/index-catalog.json

jobs:
  update-metrics:
    name: Fetch and Update Activity Metrics
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
          ref: ${{ github.ref_name }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run metrics update script
        id: metrics
        env:
          CLARITY_API_KEY: ${{ secrets.CLARITY_API_KEY }}
          HAGICODE_CLARITY_PROJECT_ID: ${{ secrets.HAGICODE_CLARITY_PROJECT_ID }}
          DOCKER_HUB_REPOSITORY: ${{ env.DOCKER_HUB_REPOSITORY }}
        run: |
          npm run update-activity-metrics 2>&1 | tee /tmp/index-activity-metrics.log
          SUMMARY_JSON=$(grep '^METRICS_SUMMARY ' /tmp/index-activity-metrics.log | tail -n 1 | sed 's/^METRICS_SUMMARY //')

          if [ -z "$SUMMARY_JSON" ]; then
            echo "Failed to capture METRICS_SUMMARY from script output." >&2
            exit 1
          fi

          {
            echo "summary_json<<EOF"
            echo "$SUMMARY_JSON"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Validate updated assets
        run: |
          npm run validate
          npm test

      - name: Collect change summary
        id: summary
        env:
          SUMMARY_JSON: ${{ steps.metrics.outputs.summary_json }}
        run: |
          PULL_COUNT=$(printf '%s' "$SUMMARY_JSON" | jq -r '.dockerHubPullCount')
          ACTIVE_USERS=$(printf '%s' "$SUMMARY_JSON" | jq -r '.activeUsers')
          ACTIVE_SESSIONS=$(printf '%s' "$SUMMARY_JSON" | jq -r '.activeSessions')
          LAST_UPDATED=$(printf '%s' "$SUMMARY_JSON" | jq -r '.lastUpdated')
          WARNINGS=$(printf '%s' "$SUMMARY_JSON" | jq -r 'if (.warnings | length) == 0 then "none" else (.warnings | join(", ")) end')

          if git diff --quiet -- $ACTIVITY_METRICS_PUBLICATION_SET; then
            echo 'has_changes=false' >> "$GITHUB_OUTPUT"
          else
            echo 'has_changes=true' >> "$GITHUB_OUTPUT"
          fi

          {
            echo 'pull_count='$PULL_COUNT
            echo 'active_users='$ACTIVE_USERS
            echo 'active_sessions='$ACTIVE_SESSIONS
            echo 'last_updated='$LAST_UPDATED
            echo 'warnings='$WARNINGS
          } >> "$GITHUB_OUTPUT"

          echo '### Activity metrics update' >> "$GITHUB_STEP_SUMMARY"
          echo '' >> "$GITHUB_STEP_SUMMARY"
          echo '| Metric | Value |' >> "$GITHUB_STEP_SUMMARY"
          echo '|---|---|' >> "$GITHUB_STEP_SUMMARY"
          echo "| Docker Hub pull count | $PULL_COUNT |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Clarity active users | $ACTIVE_USERS |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Clarity active sessions | $ACTIVE_SESSIONS |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Updated at | $LAST_UPDATED |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Warnings | $WARNINGS |" >> "$GITHUB_STEP_SUMMARY"

      - name: Configure Git
        if: steps.summary.outputs.has_changes == 'true'
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

      - name: Commit updated metrics
        if: steps.summary.outputs.has_changes == 'true'
        run: |
          git add $ACTIVITY_METRICS_PUBLICATION_SET
          git commit -m "chore(index): update activity metrics\n\n- updated at: ${{ steps.summary.outputs.last_updated }}"

      - name: Push updated metrics to current branch
        if: steps.summary.outputs.has_changes == 'true'
        env:
          BRANCH_NAME: ${{ github.ref_name }}
        run: git push origin "HEAD:${BRANCH_NAME}"

      - name: No-op summary
        if: steps.summary.outputs.has_changes != 'true'
        run: echo 'No publication-set JSON change detected; nothing was pushed.' >> "$GITHUB_STEP_SUMMARY"
