localesRoot: src/i18n/locales
repoRoot: .
baseLocale: en-US
targetLocales:
  - bg-BG
  - cs-CZ
  - da-DK
  - de-DE
  - el-GR
  - es-419
  - es-ES
  - fi-FI
  - fr-FR
  - hu-HU
  - id-ID
  - it-IT
  - ja-JP
  - ko-KR
  - nb-NO
  - nl-NL
  - pl-PL
  - pt-BR
  - pt-PT
  - ro-RO
  - ru-RU
  - sv-SE
  - th-TH
  - tr-TR
  - uk-UA
  - vi-VN
  - zh-CN
  - zh-Hant
doctor:
  excludedDirectories:
    - .git
    - .astro
    - .astro-test
    - .astro-validate
    - dist
    - node_modules
    - public
    - src/i18n/generated-locales
  textFileExtensions:
    - .astro
    - .ts
    - .js
    - .mjs
    - .json
    - .md
    - .yml
    - .yaml
  allowlist:
    legacy-index-route-code: []
    legacy-json-route-path: []
    legacy-generated-locale-path: []
