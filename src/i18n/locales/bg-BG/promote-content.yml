    alt: Илюстрация на пакета Hagicode Plus в Steam
  hagicode-turbo-engine-dlc:
    title: Turbo Engine DLC
    description: 'Turbo Engine DLC може и да не е нещо невиждано по света, но е наистина мощен: отключва до 32 едновременни онлайн сесии и още настройки за вашия Hagicode workflow. Надникнете в Steam. Моля.'
