  main-game-steam-ea-2026-04-29:
    title: Ранният достъп най-после е тук
    description: Hagicode, не съвсем уникалният в световен мащаб, но изключително удобен софтуер за Vibe Coding, вече е в Steam Early Access. Хвърлете му едно око, моля.
