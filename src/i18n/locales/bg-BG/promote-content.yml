  hagicode-plus-bundle:
    title: Пакет Hagicode Plus
    description: Hagicode Plus, не най-уникалният пакет на света, но наистина добре сглобен, е с 15% намаление и включва основната игра плюс Turbo Engine DLC. Елате да го разгледате в Steam. Молим ви.
